name: Run tests

on:
  push: 
  workflow_dispatch:
  schedule:
    # run daily at 2:22am
    - cron: "22 02 * * *"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  lint:
    runs-on: ubuntu-22.04
    name: Run lint
    steps:
    - name: Install lint dependencies
      run: sudo apt-get install -y shellcheck
    - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # 3.1.0
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run lint
      run: just tests/lint
  tests:
    name: Tests tests
    strategy:
      fail-fast: false
      matrix:
        backend_name: ['test', 'tpp', 'ted']
    runs-on: ubuntu-22.04
    steps:
    - name: Setup lxd
      uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # 1
      with:
        channel: 5.21/stable
    - name: Setup just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # 3.1.0
    - name: Checkout
      uses: actions/checkout@v6
    - name: Prepare test image
      run: |
        # some debugging info in case stuff fails
        df -h
        just tests/build
        # delete base ubuntu image as we sometimes run out of diskspace
        base_image="$(lxc image ls -f csv | awk -F, '$1 ~ /ubuntu/ { print $2; exit }')"
        if [ -n "$base_image" ]; then
          lxc image delete "$base_image"
        fi
        sudo lxc image ls
        df -h
    - name: Run tests
      run: just tests/run_test tests/backends/${{ matrix.backend_name }}.sh
